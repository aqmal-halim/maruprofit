<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaruProfit | BTC Scalp Dashboard</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 10px;
        }
        header {
            border-bottom: 1px solid #30363d;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 15px;
        }
        .chart-container {
            height: 550px;
            width: 100%;
        }
        h2 { color: #58a6ff; font-size: 1rem; margin-bottom: 10px; }
        
        .smc-alert {
            background: #1c2128;
            border-left: 4px solid #f26722;
            padding: 10px;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .chart-container { height: 450px; }
        }
    </style>
</head>
<body>

<header>
    <h1 style="font-size: 1.5rem; margin: 0;">MaruProfit ₿</h1>
    <span style="color: #3fb950; font-size: 0.8rem;">● SMART MONEY FLOW</span>
</header>

<div class="container">
    <div class="card">
        <h2>BTC/USDT 1m Scalp (VWAP/RSI/MACD)</h2>
        <div class="chart-container" id="tv-chart">
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
            new TradingView.widget({
                "width": "100%",
                "height": "100%",
                "symbol": "BINANCE:BTCUSDT",
                "interval": "1",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "enable_publishing": false,
                "hide_top_toolbar": false,
                "save_image": false,
                "container_id": "tv-chart",
                /* Adding indicators here */
                "studies": [
                    "RSI@tv-basicstudies",
                    "MACD@tv-basicstudies",
                    "VWAP@tv-basicstudies"
                ]
            });
            </script>
        </div>
        
        <div class="smc-alert">
            <strong>SMC Insight:</strong> Look for Order Blocks & Liquidity Sweeps on 1m/5m confluence. 
            <i>Note: BOS/CHoCH requires manual validation on this feed.</i>
        </div>
    </div>

    <div class="card">
        <h2>Indicator Metrics</h2>
        <div class="tradingview-widget-container">
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
            {
                "interval": "1m",
                "width": "100%",
                "height": "350",
                "symbol": "BINANCE:BTCUSDT",
                "showIntervalTabs": true,
                "colorTheme": "dark"
            }
            </script>
        </div>

        <h2 style="margin-top: 20px;">Market Sentiment News</h2>
        <div class="tradingview-widget-container">
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
            {
                "feedMode": "symbol",
                "symbol": "BINANCE:BTCUSDT",
                "colorTheme": "dark",
                "isTransparent": false,
                "displayMode": "regular",
                "width": "100%",
                "height": "450",
                "locale": "en"
            }
            </script>
        </div>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaruProfit | BTC SMC Dashboard</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --accent: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --orange: #f26722;
        }
        body {
            background-color: var(--bg);
            color: #c9d1d9;
            font-family: sans-serif;
            margin: 0;
            padding: 8px;
        }
        header {
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
        }
        .price-live { font-weight: bold; color: var(--green); }
        .container { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            overflow: hidden;
        }

        .chart-height { height: 70vh; width: 100%; }
        .gauge-height { height: 320px; width: 100%; }
        .news-height { height: 500px; width: 100%; border: none; }

        .levels-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .level-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .val { display: block; font-size: 1.1rem; font-weight: bold; margin-top: 5px; }
        .label { font-size: 0.65rem; text-transform: uppercase; color: #8b949e; letter-spacing: 0.5px; }
        h2 { font-size: 0.9rem; color: var(--accent); margin: 0; text-transform: uppercase; }
        .timestamp { font-size: 0.6rem; color: #8b949e; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 1.1rem; font-weight: bold;">MaruProfit <span style="color: var(--accent);">SMC</span></div>
    <div class="price-live" id="btc-price">Fetching...</div>
</header>

<div class="container">
    <div class="card chart-height" id="tv-chart"></div>

    <div class="levels-grid">
        <div class="level-card" style="border-top: 3px solid var(--red);">
            <span class="label">24h High (Res)</span>
            <span class="val" id="day-high">---</span>
        </div>
        <div class="level-card" style="border-top: 3px solid var(--green);">
            <span class="label">24h Low (Supp)</span>
            <span class="val" id="day-low">---</span>
        </div>
        <div class="level-card" style="grid-column: span 2; border-left: 4px solid var(--orange);">
            <span class="label">Potential Bullish OB Zone</span>
            <span class="val" id="ob-zone" style="color: var(--orange);">Calculating...</span>
        </div>
    </div>

    <div class="card">
        <h2>Technical Sentiment</h2>
        <div class="gauge-height">
            <div class="tradingview-widget-container">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "1m",
                    "width": "100%",
                    "height": "100%",
                    "symbol": "BINANCE:BTCUSDT",
                    "showIntervalTabs": true,
                    "colorTheme": "dark",
                    "locale": "en"
                }
                </script>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Real-Time Binance News</h2>
        <span class="timestamp" id="news-update">Syncing with exchange...</span>
        <div class="news-height">
            <div class="tradingview-widget-container">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                {
                    "feedMode": "market",
                    "market": "crypto",
                    "colorTheme": "dark",
                    "isTransparent": false,
                    "displayMode": "regular",
                    "width": "100%",
                    "height": "100%",
                    "locale": "en"
                }
                </script>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    // Initialize Chart
    new TradingView.widget({
        "autosize": true,
        "symbol": "BINANCE:BTCUSDT",
        "interval": "1",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "container_id": "tv-chart",
        "studies": ["RSI@tv-basicstudies", "VWAP@tv-basicstudies", "MACD@tv-basicstudies"]
    });

    async function updateDashboard() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
            const data = await res.json();
            
            const price = parseFloat(data.lastPrice).toFixed(2);
            document.getElementById('btc-price').innerText = `$${price}`;
            document.getElementById('day-high').innerText = `$${parseFloat(data.highPrice).toFixed(2)}`;
            document.getElementById('day-low').innerText = `$${parseFloat(data.lowPrice).toFixed(2)}`;

            const obStart = (data.lowPrice * 1.001).toFixed(2);
            const obEnd = (data.lowPrice * 1.003).toFixed(2);
            document.getElementById('ob-zone').innerText = `${obStart} - ${obEnd}`;
            
            // Update time stamp
            const now = new Date();
            document.getElementById('news-update').innerText = "Last Sync: " + now.toLocaleTimeString();

        } catch (e) { console.error("Data error", e); }
    }

    setInterval(updateDashboard, 3000);
    updateDashboard();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaruProfit | BTC Scalp Dashboard</title>
    <style>
        /* Dark Theme for Traders */
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        header {
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            min-height: 400px;
        }
        .news-card {
            height: 600px;
            overflow-y: auto;
        }
        h2 { color: #58a6ff; font-size: 1.2rem; margin-top: 0; }
        
        /* Responsive for Mobile */
        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>MaruProfit ₿</h1>
    <div>
        <span style="color: #3fb950;">● Live Market Data</span>
    </div>
</header>

<div class="container">
    <div class="card">
        <h2>BTC/USDT 1-Minute Scalp Chart</h2>
        <div class="tradingview-widget-container" style="height: 500px;">
            <div id="tradingview_btc"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
            new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:BTCUSDT",
                "interval": "1",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "container_id": "tradingview_btc"
            });
            </script>
        </div>
    </div>

    <div class="card news-card">
        <h2>Technical Sentiment</h2>
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
            {
                "interval": "1m",
                "width": "100%",
                "isTransparent": false,
                "height": "400",
                "symbol": "BINANCE:BTCUSDT",
                "showIntervalTabs": true,
                "locale": "en",
                "colorTheme": "dark"
            }
            </script>
        </div>

        <hr style="border: 0.5px solid #30363d; margin: 20px 0;">
        
        <h2>Market Digest</h2>
        <p style="font-size: 0.9rem; color: #8b949e;">
            News aggregation loading... <br>
            <i>(Tip: Check for BOS/CHoCH on the 1m chart for scalp entries)</i>
        </p>
    </div>
</div>

</body>
</html>

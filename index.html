<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaruProfit | BTC SMC Dashboard</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --accent: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --orange: #f26722;
        }
        body {
            background-color: var(--bg);
            color: #c9d1d9;
            font-family: sans-serif;
            margin: 0;
            padding: 5px;
        }
        header {
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .price-live { font-weight: bold; color: var(--green); }
        
        .container { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        
        /* Fixed Chart Visibility */
        .chart-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            height: 60vh; /* Takes 60% of screen height */
            width: 100%;
            overflow: hidden;
        }

        /* Order Block & Levels Section */
        .levels-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .level-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .val { display: block; font-size: 1.2rem; font-weight: bold; margin-top: 5px; }
        .label { font-size: 0.7rem; text-transform: uppercase; color: #8b949e; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 1.1rem; font-weight: bold;">MaruProfit <span style="color: var(--accent);">SMC</span></div>
    <div class="price-live" id="btc-price">Fetching...</div>
</header>

<div class="container">
    <div class="chart-card" id="tv-chart"></div>

    <div class="levels-grid">
        <div class="level-card" style="border-top: 3px solid var(--red);">
            <span class="label">24h High (Key Resistance)</span>
            <span class="val" id="day-high">---</span>
        </div>
        <div class="level-card" style="border-top: 3px solid var(--green);">
            <span class="label">24h Low (Key Support)</span>
            <span class="val" id="day-low">---</span>
        </div>
        <div class="level-card" style="grid-column: span 2; border-left: 4px solid var(--orange);">
            <span class="label">Potential Bullish OB Zone (Manual Validation)</span>
            <span class="val" id="ob-zone" style="color: var(--orange);">Calculating...</span>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    // 1. Initialize Chart with optimized mobile height
    new TradingView.widget({
        "autosize": true,
        "symbol": "BINANCE:BTCUSDT",
        "interval": "1",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "container_id": "tv-chart",
        "studies": ["RSI@tv-basicstudies", "VWAP@tv-basicstudies"]
    });

    // 2. Fetch Live Binance Data for Levels
    async function updateLevels() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
            const data = await res.json();
            
            const price = parseFloat(data.lastPrice).toFixed(2);
            const high = parseFloat(data.highPrice).toFixed(2);
            const low = parseFloat(data.lowPrice).toFixed(2);

            document.getElementById('btc-price').innerText = `$${price}`;
            document.getElementById('day-high').innerText = `$${high}`;
            document.getElementById('day-low').innerText = `$${low}`;

            // Simplified logic: Bullish OB often forms just above the recent low
            const obStart = (low * 1.001).toFixed(2);
            const obEnd = (low * 1.003).toFixed(2);
            document.getElementById('ob-zone').innerText = `${obStart} - ${obEnd}`;

        } catch (e) { console.error("Data error", e); }
    }

    setInterval(updateLevels, 3000);
    updateLevels();
</script>

</body>
</html>

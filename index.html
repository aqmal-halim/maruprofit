<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaruProfit | BTC Scalp Dashboard</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 10px;
        }
        header {
            border-bottom: 1px solid #30363d;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 10px;
            overflow: hidden;
        }
        /* Fixes the "badly done" chart height */
        .chart-container {
            height: 500px;
            width: 100%;
        }
        h2 { color: #58a6ff; font-size: 1rem; margin-bottom: 10px; }

        /* Mobile Optimization */
        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .chart-container { height: 400px; }
        }
    </style>
</head>
<body>

<header>
    <h1 style="font-size: 1.5rem; margin: 0;">MaruProfit ₿</h1>
    <span style="color: #3fb950; font-size: 0.8rem;">● LIVE DATA</span>
</header>

<div class="container">
    <div class="card">
        <h2>BTC/USDT 1m Scalp</h2>
        <div class="chart-container" id="tv-chart">
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
            new TradingView.widget({
                "width": "100%",
                "height": "100%",
                "symbol": "BINANCE:BTCUSDT",
                "interval": "1",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "enable_publishing": false,
                "allow_symbol_change": true,
                "container_id": "tv-chart"
            });
            </script>
        </div>
    </div>

    <div class="card">
        <h2>Technical Sentiment</h2>
        <div class="tradingview-widget-container">
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
            {
                "interval": "1m",
                "width": "100%",
                "height": "350",
                "symbol": "BINANCE:BTCUSDT",
                "showIntervalTabs": true,
                "colorTheme": "dark"
            }
            </script>
        </div>

        <h2 style="margin-top: 20px;">Real-Time News</h2>
        <div class="tradingview-widget-container">
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
            {
                "feedMode": "all_symbols",
                "isTransparent": false,
                "displayMode": "regular",
                "width": "100%",
                "height": "450",
                "colorTheme": "dark",
                "locale": "en",
                "symbol": "BINANCE:BTCUSDT"
            }
            </script>
        </div>
    </div>
</div>

</body>
</html>

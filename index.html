<!DOCTYPE html>
<html>
<head>
    <title>BTC Live Tracker</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; }
        #price { font-size: 48px; color: #00ff00; }
    </style>
</head>
<body>
    <h1>Bitcoin Real-Time Price</h1>
    <div id="price">Loading...</div>

    <script>
        async function getPrice() {
            const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
            const data = await response.json();
            document.getElementById('price').innerText = '$' + parseFloat(data.price).toFixed(2);
        }
        setInterval(getPrice, 3000); // Updates every 3 seconds
        getPrice();
    </script>
</body>
</html>

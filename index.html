<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaruProfit | BTC SMC Dashboard</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --accent: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --orange: #f26722;
        }
        body {
            background-color: var(--bg);
            color: #c9d1d9;
            font-family: sans-serif;
            margin: 0;
            padding: 8px;
        }
        header {
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
        }
        .price-live { font-weight: bold; color: var(--green); }
        .container { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            overflow: hidden;
        }

        .chart-height { height: 70vh; width: 100%; }
        .gauge-height { height: 320px; width: 100%; }
        .news-height { height: 500px; width: 100%; overflow-y: auto; }

        .levels-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .level-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .val { display: block; font-size: 1.1rem; font-weight: bold; margin-top: 5px; }
        .label { font-size: 0.65rem; text-transform: uppercase; color: #8b949e; letter-spacing: 0.5px; }
        h2 { font-size: 0.9rem; color: var(--accent); margin: 0 0 5px 0; text-transform: uppercase; }
        
        .news-item { border-bottom: 1px solid var(--border); padding: 10px 0; font-size: 0.85rem; }
        .news-item:last-child { border-bottom: none; }
        .news-time { color: var(--accent); font-size: 0.7rem; display: block; margin-bottom: 4px; }
        .news-source { color: #8b949e; font-size: 0.7rem; float: right; }
        
        #news-status { font-size: 0.6rem; color: var(--green); margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 1.1rem; font-weight: bold;">MaruProfit <span style="color: var(--accent);">SMC</span></div>
    <div class="price-live" id="btc-price">Fetching...</div>
</header>

<div class="container">
    <div class="card chart-height" id="tv-chart"></div>

    <div class="levels-grid">
        <div class="level-card" style="border-top: 3px solid var(--red);">
            <span class="label">24h High</span>
            <span class="val" id="day-high">---</span>
        </div>
        <div class="level-card" style="border-top: 3px solid var(--green);">
            <span class="label">24h Low</span>
            <span class="val" id="day-low">---</span>
        </div>
        <div class="level-card" style="grid-column: span 2; border-left: 4px solid var(--orange);">
            <span class="label">Bullish OB Zone</span>
            <span class="val" id="ob-zone" style="color: var(--orange);">---</span>
        </div>
    </div>

    <div class="card">
        <h2>Technical Sentiment</h2>
        <div class="gauge-height">
            <div class="tradingview-widget-container">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "1m",
                    "width": "100%",
                    "height": "100%",
                    "symbol": "BINANCE:BTCUSDT",
                    "showIntervalTabs": true,
                    "colorTheme": "dark",
                    "locale": "en"
                }
                </script>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Live News Wire (BTC Only)</h2>
        <span id="news-status">● Filtering for BTC Headlines</span>
        <div class="news-height" id="news-wire">
            <div class="news-item">
                <span class="news-time">Scanning...</span>
                Filtering for Bitcoin-specific headlines...
            </div>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    new TradingView.widget({
        "autosize": true,
        "symbol": "BINANCE:BTCUSDT",
        "interval": "1",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "container_id": "tv-chart",
        "studies": ["RSI@tv-basicstudies", "VWAP@tv-basicstudies", "MACD@tv-basicstudies"]
    });

    async function updateDashboard() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
            const data = await res.json();
            document.getElementById('btc-price').innerText = `$${parseFloat(data.lastPrice).toFixed(2)}`;
            document.getElementById('day-high').innerText = `$${parseFloat(data.highPrice).toFixed(2)}`;
            document.getElementById('day-low').innerText = `$${parseFloat(data.lowPrice).toFixed(2)}`;
            const obStart = (parseFloat(data.lowPrice) * 1.001).toFixed(2);
            const obEnd = (parseFloat(data.lowPrice) * 1.003).toFixed(2);
            document.getElementById('ob-zone').innerText = `${obStart} - ${obEnd}`;
        } catch (e) { console.error("Price error", e); }
    }

    async function updateNews() {
        // High-speed API query
        const feedUrl = "https://www.binance.com/bapi/composite/v1/public/cms/article/list/query?type=1&pageNo=1&pageSize=50";
        const btcKeywords = ["btc", "bitcoin", "halving", "satoshi", "etf"];
        
        try {
            const response = await fetch(feedUrl);
            const data = await response.json();
            const newsContainer = document.getElementById('news-wire');
            newsContainer.innerHTML = '';

            let count = 0;
            data.data.catalogs[0].articles.forEach(article => {
                const titleLower = article.title.toLowerCase();
                // Client-side filtering logic
                if (btcKeywords.some(key => titleLower.includes(key))) {
                    const item = document.createElement('div');
                    item.className = 'news-item';
                    const time = new Date(article.releaseDate).toLocaleTimeString();
                    item.innerHTML = `
                        <span class="news-source">Binance News</span>
                        <span class="news-time">${time}</span>
                        <strong>${article.title}</strong>
                    `;
                    newsContainer.appendChild(item);
                    count++;
                }
            });

            if(count === 0) {
                newsContainer.innerHTML = '<div class="news-item">No new BTC-specific headlines in last batch.</div>';
            }
            document.getElementById('news-status').innerText = `● BTC Filter Active (${count} found)`;
        } catch (e) {
            // Fallback to BTC-specific pre-filtered RSS widget
            document.getElementById('news-wire').innerHTML = `
                <iframe width="100%" height="450" src="https://rss.app/embed/v1/feed/pXl6Z3iU0aR5G9kH" frameborder="0"></iframe>
            `;
        }
    }

    setInterval(updateDashboard, 3000);
    setInterval(updateNews, 60000);
    updateDashboard();
    updateNews();
</script>

</body>
</html>
